<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login/Register - Hydromart Marketplace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md">
        <h2 id="auth-title" class="text-2xl font-bold text-center text-orange-600 mb-6">Masuk ke HydroMart</h2>
        
        <form id="auth-form" onsubmit="handleAuth(event)">
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700">Email</label>
                <input type="email" id="auth-email" required class="mt-1 block w-full p-2.5 border rounded-lg focus:ring-orange-500 focus:border-orange-500">
            </div>
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700">Password</label>
                <input type="password" id="auth-password" required class="mt-1 block w-full p-2.5 border rounded-lg">
            </div>
            
            <div id="register-fields" class="hidden">
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700">Nama Lengkap / Nama Toko</label>
                    <input type="text" id="auth-name" class="mt-1 block w-full p-2.5 border rounded-lg">
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700">Daftar Sebagai</label>
                    <select id="auth-role" class="mt-1 block w-full p-2.5 border rounded-lg">
                        <option value="pembeli">Pembeli (Mencari Alat Sipil Air)</option>
                        <option value="vendor">Vendor / Toko Bangunan Air</option>
                    </select>
                </div>
            </div>

            <button type="submit" id="submit-btn" class="w-full bg-orange-500 text-white p-3 rounded-lg font-semibold hover:bg-orange-600 transition">Masuk</button>
        </form>

        <p class="text-sm text-center text-gray-600 mt-4">
            <span id="toggle-text">Belum punya akun?</span> 
            <button onclick="toggleAuthMode()" class="text-orange-600 font-semibold hover:underline" id="toggle-btn">Daftar Sekarang</button>
        </p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="main.js"></script>
    <script>
        window.onload = checkUserSession;
        document.getElementById('auth-form').addEventListener('submit', handleAuth);
    </script>
